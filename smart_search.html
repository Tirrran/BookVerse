<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BookVerse: Умный поиск по книгам</title>
  <style>
    :root {
      --bg: #f4f6fb;
      --card: #ffffff;
      --text: #1f2937;
      --muted: #6b7280;
      --accent: #0f766e;
      --accent-soft: #d1fae5;
      --border: #dbe3ef;
      --danger: #b91c1c;
    }

    body {
      margin: 0;
      font-family: "Segoe UI", "Noto Sans", sans-serif;
      color: var(--text);
      background: radial-gradient(circle at 10% 10%, #e0f2fe 0%, transparent 35%),
                  radial-gradient(circle at 90% 0%, #dcfce7 0%, transparent 30%),
                  var(--bg);
    }

    .container {
      max-width: 1100px;
      margin: 24px auto 48px;
      padding: 0 16px;
    }

    h1 {
      font-size: 28px;
      margin-bottom: 8px;
    }

    .subtitle {
      color: var(--muted);
      margin-bottom: 20px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
      gap: 16px;
    }

    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 16px;
      box-shadow: 0 8px 24px rgba(16, 24, 40, 0.06);
    }

    .card h2 {
      margin-top: 0;
      font-size: 18px;
    }

    .row {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-bottom: 10px;
    }

    input[type="text"], input[type="number"], input[type="file"] {
      width: 100%;
      box-sizing: border-box;
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 10px 12px;
      font-size: 14px;
    }

    input[type="number"] {
      max-width: 120px;
    }

    button {
      border: none;
      border-radius: 8px;
      padding: 10px 14px;
      font-weight: 600;
      background: var(--accent);
      color: white;
      cursor: pointer;
    }

    button.secondary {
      background: #0f172a;
    }

    button:hover {
      opacity: 0.9;
    }

    .status {
      margin-top: 8px;
      font-size: 13px;
      color: var(--muted);
      min-height: 18px;
    }

    .status.error {
      color: var(--danger);
    }

    ul.books {
      margin: 0;
      padding-left: 18px;
      max-height: 180px;
      overflow: auto;
    }

    .result-list {
      display: grid;
      gap: 10px;
      margin-top: 10px;
    }

    .result-item {
      border: 1px solid var(--border);
      border-left: 4px solid #14b8a6;
      border-radius: 8px;
      padding: 10px;
      background: #f8fafc;
    }

    .meta {
      color: var(--muted);
      font-size: 12px;
      margin-bottom: 6px;
    }

    .answer {
      border: 1px solid var(--border);
      border-radius: 8px;
      background: var(--accent-soft);
      padding: 12px;
      margin-top: 10px;
      white-space: pre-wrap;
    }

    @media (max-width: 700px) {
      h1 { font-size: 24px; }
      .container { margin-top: 16px; }
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>BookVerse: Умный поиск по книгам</h1>
    <div class="subtitle">Загрузите .txt книги, найдите релевантные фрагменты и получите ответ с цитатами-основаниями.</div>

    <div class="grid">
      <section class="card">
        <h2>1) Загрузка книг</h2>
        <div class="row">
          <input id="upload-file" type="file" accept=".txt" />
          <button id="upload-btn">Загрузить .txt</button>
          <button class="secondary" id="refresh-books-btn">Обновить список</button>
        </div>
        <div id="upload-status" class="status"></div>
        <ul id="books-list" class="books"></ul>
      </section>

      <section class="card">
        <h2>2) Поиск фрагментов</h2>
        <div class="row">
          <input id="search-query" type="text" placeholder="Например: Найди, где говорится о войне" />
        </div>
        <div class="row">
          <input id="search-topk" type="number" min="1" max="10" value="5" />
          <button id="search-btn">Искать</button>
        </div>
        <div id="search-status" class="status"></div>
        <div id="search-results" class="result-list"></div>
      </section>

      <section class="card" style="grid-column: 1 / -1;">
        <h2>3) Ответ на вопрос с цитатами</h2>
        <div class="row">
          <input id="ask-question" type="text" placeholder="Например: Что произошло с героями в финале?" />
        </div>
        <div class="row">
          <input id="ask-topk" type="number" min="1" max="10" value="5" />
          <input id="ask-citations" type="number" min="1" max="5" value="3" />
          <button id="ask-btn">Ответить</button>
        </div>
        <div id="ask-status" class="status"></div>
        <div id="ask-answer" class="answer" style="display:none;"></div>
        <div id="ask-citations-list" class="result-list"></div>
      </section>
    </div>
  </div>

  <script>
    const booksList = document.getElementById("books-list");
    const uploadStatus = document.getElementById("upload-status");
    const searchStatus = document.getElementById("search-status");
    const askStatus = document.getElementById("ask-status");

    function setStatus(el, text, isError = false) {
      el.textContent = text || "";
      el.classList.toggle("error", Boolean(isError));
    }

    async function safeJson(response) {
      try {
        return await response.json();
      } catch (e) {
        return {};
      }
    }

    async function loadBooks() {
      const response = await fetch("/api/case/books");
      const books = await safeJson(response);
      booksList.innerHTML = "";

      if (!Array.isArray(books) || books.length === 0) {
        booksList.innerHTML = "<li>Пока нет загруженных книг</li>";
        return;
      }

      books.forEach((book) => {
        const li = document.createElement("li");
        li.textContent = `${book.original_filename} (${new Date(book.uploaded_at).toLocaleString("ru-RU")})`;
        booksList.appendChild(li);
      });
    }

    document.getElementById("upload-btn").addEventListener("click", async () => {
      const fileInput = document.getElementById("upload-file");
      const file = fileInput.files[0];

      if (!file) {
        setStatus(uploadStatus, "Выберите .txt файл для загрузки", true);
        return;
      }

      const formData = new FormData();
      formData.append("file", file);

      setStatus(uploadStatus, "Загружаю...");
      const response = await fetch("/api/case/upload", {
        method: "POST",
        body: formData
      });

      const data = await safeJson(response);
      if (!response.ok) {
        setStatus(uploadStatus, data.detail || "Ошибка загрузки файла", true);
        return;
      }

      setStatus(uploadStatus, `Загружено: ${data.original_filename}`);
      fileInput.value = "";
      await loadBooks();
    });

    document.getElementById("refresh-books-btn").addEventListener("click", loadBooks);

    document.getElementById("search-btn").addEventListener("click", async () => {
      const query = document.getElementById("search-query").value.trim();
      const topK = parseInt(document.getElementById("search-topk").value, 10) || 5;
      const resultsBox = document.getElementById("search-results");
      resultsBox.innerHTML = "";

      if (!query) {
        setStatus(searchStatus, "Введите запрос для поиска", true);
        return;
      }

      setStatus(searchStatus, "Ищу...");
      const response = await fetch("/api/case/search", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ query, top_k: topK })
      });

      const data = await safeJson(response);
      if (!response.ok) {
        setStatus(searchStatus, data.detail || "Ошибка поиска", true);
        return;
      }

      if (!data.found) {
        setStatus(searchStatus, data.message || "Ничего не найдено");
        return;
      }

      setStatus(searchStatus, `Найдено фрагментов: ${data.fragments.length}`);
      data.fragments.forEach((item) => {
        const block = document.createElement("div");
        block.className = "result-item";
        block.innerHTML = `
          <div class="meta">${item.book_title} | строки ${item.location.line_start}-${item.location.line_end} | score: ${item.score}</div>
          <div>${item.fragment}</div>
        `;
        resultsBox.appendChild(block);
      });
    });

    document.getElementById("ask-btn").addEventListener("click", async () => {
      const question = document.getElementById("ask-question").value.trim();
      const topK = parseInt(document.getElementById("ask-topk").value, 10) || 5;
      const citationsK = parseInt(document.getElementById("ask-citations").value, 10) || 3;
      const answerBox = document.getElementById("ask-answer");
      const citationsBox = document.getElementById("ask-citations-list");
      citationsBox.innerHTML = "";
      answerBox.style.display = "none";

      if (!question) {
        setStatus(askStatus, "Введите вопрос", true);
        return;
      }

      setStatus(askStatus, "Формирую ответ...");
      const response = await fetch("/api/case/ask", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ question, top_k: topK, citations_k: citationsK })
      });

      const data = await safeJson(response);
      if (!response.ok) {
        setStatus(askStatus, data.detail || "Ошибка при формировании ответа", true);
        return;
      }

      answerBox.style.display = "block";
      answerBox.textContent = data.answer;

      if (!data.found) {
        setStatus(askStatus, "Ответ не найден в загруженных книгах");
        return;
      }

      setStatus(askStatus, `Готово. Цитат-оснований: ${(data.citations || []).length}`);
      (data.citations || []).forEach((item) => {
        const block = document.createElement("div");
        block.className = "result-item";
        block.innerHTML = `
          <div class="meta">${item.book_title} | строки ${item.location.line_start}-${item.location.line_end} | score: ${item.score}</div>
          <div>${item.fragment}</div>
        `;
        citationsBox.appendChild(block);
      });
    });

    loadBooks();
  </script>
</body>
</html>
