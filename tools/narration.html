<!-- tools/narration.html -->

<div class="narration-container">
    <p>Выберите количество страниц для озвучивания или озвучить всю книгу:</p>
    <div>
        <input type="radio" id="narrate-pages" name="narration-type" value="pages" checked />
        <label for="narrate-pages">Озвучить количество страниц:</label>
        <input type="number" id="pages-count" min="1" value="10" style="width: 60px; margin-left: 10px;" />
    </div>
    <div>
        <input type="radio" id="narrate-all" name="narration-type" value="all" />
        <label for="narrate-all">Озвучить всю книгу</label>
    </div>
    <button onclick="startNarration()">Начать озвучивание</button>
    
    <div id="narration-status" class="narration-status"></div>
    
    <div id="audio-player" class="audio-player" style="display: none;">
        <p>Длительность: <span id="audio-duration">0:00</span></p>
        <audio controls id="audio-element">
            <source id="audio-source" src="" type="audio/mpeg">
            Ваш браузер не поддерживает аудио.
        </audio>
        <a id="download-audio" href="#" download="narration.mp3">Скачать аудио</a>
    </div>
</div>
