<div class="tool-content">
    <form id="quiz-form">
        <div class="form-group">
            <label for="difficulty">Выберите сложность:</label>
            <select id="difficulty" name="difficulty">
                <option value="easy">Легкая</option>
                <option value="medium">Средняя</option>
                <option value="hard">Сложная</option>
            </select>
        </div>

        <div class="form-group">
            <label for="question-count">Количество вопросов:</label>
            <input type="number" id="question-count" name="question-count" min="3" max="20" value="8">
        </div>

        <div class="form-group">
            <label for="custom-input">Ваши пожелания для теста:</label>
            <input type="text" id="custom-input" name="custom-input" placeholder="Например, вопросы по главам 1-3">
        </div>

        <div class="button-group">
            <button type="button" id="generate-button">Сгенерировать викторину</button>
        </div>
    </form>
    <div id="quiz-status" class="summary-status"></div>
    <div id="quiz-result" class="summary-result">Тут будут отображаться вопросы и ответы</div>
</div>
