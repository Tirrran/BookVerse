<div class="tool-content">
    <form id="summarization-form">
        <div class="form-group">
            <label for="compression-level">Выберите степень сжатия:</label>
            <select id="compression-level" name="compression-level">
                <option value="high">Высокая</option>
                <option value="medium">Средняя</option>
                <option value="low">Низкая</option>
            </select>
        </div>
        <div class="form-group">
            <label for="custom-preferences">Введите свои пожелания по сжатию:</label>
            <input type="text" id="custom-preferences" name="custom-preferences" placeholder="Например, выделить главные персонажи">
        </div>
        <div class="form-group">
            <label>Режим ответа:</label>
            <div class="inline-options">
                <label>Только <strong>Гибрид</strong> (алгоритм + локальная LLM + grounding)</label>
            </div>
            <input type="text" id="summary-local-model" placeholder="Модель Ollama (например: gemma3:1b)">
            <div class="model-preset-row">
                <button type="button" class="model-preset-btn" data-model="gemma3:1b">gemma3:1b (быстро)</button>
                <button type="button" class="model-preset-btn" data-model="qwen2.5:1.5b-instruct">qwen2.5:1.5b (точнее)</button>
            </div>
        </div>
        <div class="button-group">
            <button type="button" id="summarize-button">Суммаризировать</button>
        </div>
    </form>
    <div id="summary-status" class="summary-status"></div>
    <div id="summary-result" class="summary-result">Тут будет результат</div>
    <div id="summary-citations" class="summary-citations"></div>
</div>
