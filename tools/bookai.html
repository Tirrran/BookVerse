<div class="tool-content smart-tool">
    <div class="scope-row">
        <label><input type="radio" name="search-scope" value="current" checked> Текущая книга</label>
        <label><input type="radio" name="search-scope" value="all"> Все мои книги</label>
    </div>

    <section class="tool-section">
        <h3>Поиск фрагментов</h3>
        <div class="action-row">
            <input type="text" id="search-query" placeholder="Например: Найди, где говорится о дуэли" />
            <button id="search-button">Искать</button>
        </div>
        <div id="search-status" class="status-line"></div>
        <div id="search-results" class="results-list"></div>
    </section>

    <section class="tool-section">
        <h3>Ответ на вопрос с цитатами</h3>
        <div class="action-row">
            <input type="text" id="question-input" placeholder="Например: Почему герой покинул город?" />
            <button id="ask-button">Ответить</button>
        </div>
        <div id="answer-status" class="status-line"></div>
        <div id="answer-box" class="answer-box"></div>
        <h4>Цитаты-основания</h4>
        <div id="citations-list" class="results-list"></div>
    </section>
</div>
