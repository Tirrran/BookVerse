<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Регистрация - BookVerse</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles/auth.css">
</head>
<body>
    <div class="auth-container">
        <div class="auth-card">
            <h1>📚 BookVerse</h1>
            <h2>Создать аккаунт</h2>
            <form id="register-form" class="auth-form">
                <div class="form-group">
                    <input type="text" name="username" placeholder="Имя пользователя" required>
                </div>
                <div class="form-group">
                    <input type="email" name="email" placeholder="Email" required>
                </div>
                <div class="form-group">
                    <input type="password" name="password" placeholder="Пароль" required>
                </div>
                <button type="submit" class="auth-button">Создать аккаунт</button>
            </form>
            <p class="auth-link">
                Уже есть аккаунт? <a href="login.html">Войти</a>
            </p>
        </div>
        <div class="floating-elements">
            <span>📚</span>
            <span>📖</span>
            <span>🎧</span>
            <span>🤖</span>
            <span>🎨</span>
            <span>📱</span>
            <span>💫</span>
            <span>✨</span>
            <span>📝</span>
            <span>🌟</span>
        </div>
    </div>

    <script>
        const AUTH_DISABLED = true;
        if (AUTH_DISABLED) {
            localStorage.setItem('authToken', 'auth-disabled');
            window.location.href = 'library.html';
        }

        document.getElementById('register-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const formData = new FormData(e.target);
            const data = {
                username: formData.get('username'),
                email: formData.get('email'),
                password: formData.get('password')
            };

            try {
                const response = await fetch('http://localhost:8000/register', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(data)
                });

                if (!response.ok) {
                    const error = await response.json();
                    throw new Error(error.detail || 'Ошибка регистрации');
                }

                // После успешной регистрации выполняем вход
                const loginData = new URLSearchParams();
                loginData.append('username', data.username);
                loginData.append('password', data.password);

                const loginResponse = await fetch('http://localhost:8000/login', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/x-www-form-urlencoded'
                    },
                    body: loginData
                });

                if (!loginResponse.ok) {
                    throw new Error('Ошибка входа после регистрации');
                }

                const result = await loginResponse.json();
                localStorage.setItem('authToken', result.token);
                window.location.href = 'library.html';
                
            } catch (error) {
                console.error('Error:', error);
                alert(error.message);
            }
        });
    </script>
</body>
</html>
