<!DOCTYPE html>
<html>
<head>
    <title>Default Cover</title>
    <style>
        body {
            margin: 0;
            padding: 20px;
            background: linear-gradient(135deg, #f8f9fa 0%, #e9ecef 100%);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: system-ui, -apple-system, sans-serif;
        }
        .cover {
            text-align: center;
            color: #4a90e2;
        }
        .icon {
            font-size: 48px;
            margin-bottom: 20px;
        }
        .text {
            font-size: 24px;
            color: #2c3e50;
        }
    </style>
</head>
<body>
    <div class="cover">
        <div class="icon">📚</div>
        <div class="text">Нет обложки</div>
    </div>
</body>
</html>
